name: Python Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas openai pytest

      - name: Run tests
        run: pytest

      - name: Compile Python files
        run: |
          python -m py_compile csv_ingestor.py schema_manager.py validator.py query_service.py llm_adapter.py main.py

